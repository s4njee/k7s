# ConfigMaps and Secrets for the Config section. Secret values are dummy data —
# the app only ever shows names/metadata, never values.

apiVersion: v1
kind: ConfigMap
metadata:
  name: valkyrie-api-config
  namespace: prod
data:
  log-level: "info"
  max-connections: "100"
  feature-flags: "canary,fast-path"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bifrost-routes
  namespace: prod
data:
  routes.yaml: |
    - path: /api
      upstream: valkyrie-api:8080
---
apiVersion: v1
kind: Secret
metadata:
  name: yggdrasil-db-creds
  namespace: prod
type: Opaque
stringData:
  username: postgres
  password: not-a-real-password
  database: yggdrasil
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-pull
  namespace: prod
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: "{}"
