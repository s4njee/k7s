# kind cluster config for the k7s fixture environment.
# A single node is enough to exercise every view; the manifests under manifests/
# create a realistic spread of workloads (including a CrashLoopBackOff and a
# Pending pod) across the prod/staging/monitoring namespaces.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k7s-dev
nodes:
  - role: control-plane
